<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词翻译设置</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .setting-item {
      margin-bottom: 16px;
    }
    .label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    select, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background: white;
      box-sizing: border-box;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #4285f4;
    }
    .api-config {
      margin-top: 12px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 4px;
      display: none;
    }
    .api-input {
      margin-bottom: 8px;
    }
    .api-input:last-child {
      margin-bottom: 0;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      line-height: 1.4;
    }
    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
    }
    .usage-box {
      background: #f8f9fa;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }
    .usage-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .usage-row:last-child {
      margin-bottom: 0;
    }
    .usage-label {
      color: #666;
    }
    .usage-value {
      color: #333;
      font-weight: 500;
    }
    .usage-value.warn {
      color: #f57c00;
    }
    .usage-value.danger {
      color: #d93025;
    }
    .progress {
      width: 100%;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%;
      background: #4285f4;
      transition: width 0.3s;
    }
    .progress-bar.warn { background: #f57c00; }
    .progress-bar.danger { background: #d93025; }
    .usage-link {
      display: inline-block;
      color: #4285f4;
      text-decoration: none;
      font-size: 11px;
      margin-left: 6px;
    }
    .usage-link:hover {
      text-decoration: underline;
    }
    .usage-reset {
      color: #999;
      font-size: 11px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 6px;
    }
    .usage-reset:hover {
      color: #d93025;
    }
  </style>
</head>
<body>
  <div class="title">划词翻译设置</div>
  
  <div class="setting-item">
    <label class="label" for="translateEngine">翻译引擎</label>
    <select id="translateEngine">
      <option value="google">谷歌翻译（无需配置）</option>
      <option value="baidu">百度翻译（通用版）</option>
      <option value="baidu_llm">百度翻译（大模型版）</option>
      <option value="tencent">腾讯翻译</option>
    </select>
  </div>

  <!-- 百度翻译配置（通用版与大模型版共用 APP ID/密钥） -->
  <div id="baidu-config" class="api-config">
    <div class="api-input">
      <label class="label" for="baiduAppId">APP ID</label>
      <input type="text" id="baiduAppId" placeholder="输入百度翻译 APP ID">
    </div>
    <div class="api-input">
      <label class="label" for="baiduAppKey">密钥</label>
      <input type="password" id="baiduAppKey" placeholder="输入百度翻译密钥">
    </div>
    <div class="hint">在百度翻译开放平台申请，通用版和大模型版使用同一密钥</div>
    <div class="usage-box" id="baidu-usage-box">
      <div class="usage-row">
        <span class="usage-label">本月已用</span>
        <span><span class="usage-value" id="baidu-usage-used">0</span> / 1,000,000 字符</span>
      </div>
      <div class="progress"><div class="progress-bar" id="baidu-usage-bar" style="width: 0%"></div></div>
      <div class="usage-row" style="margin-top: 6px;">
        <span class="usage-label">剩余 <span class="usage-value" id="baidu-usage-left">1,000,000</span></span>
        <a class="usage-link" href="https://fanyi-api.baidu.com/manage/overview" target="_blank">官方查询</a>
      </div>
      <button class="usage-reset" data-engine="baidu">重置本地统计</button>
    </div>
  </div>

  <div id="baidu_llm-config" class="api-config">
    <div class="api-input">
      <label class="label" for="baiduAppId2">APP ID</label>
      <input type="text" id="baiduAppId2" placeholder="输入百度翻译 APP ID">
    </div>
    <div class="api-input">
      <label class="label" for="baiduAppKey2">密钥</label>
      <input type="password" id="baiduAppKey2" placeholder="输入百度翻译密钥">
    </div>
    <div class="hint">大模型翻译 (BLM)：需在百度翻译开放平台开通"大模型翻译"服务</div>
    <div class="usage-box" id="baidu_llm-usage-box">
      <div class="usage-row">
        <span class="usage-label">本月已用</span>
        <span><span class="usage-value" id="baidu_llm-usage-used">0</span> / 1,000,000 字符</span>
      </div>
      <div class="progress"><div class="progress-bar" id="baidu_llm-usage-bar" style="width: 0%"></div></div>
      <div class="usage-row" style="margin-top: 6px;">
        <span class="usage-label">剩余 <span class="usage-value" id="baidu_llm-usage-left">1,000,000</span></span>
        <a class="usage-link" href="https://fanyi-api.baidu.com/manage/overview" target="_blank">官方查询</a>
      </div>
      <button class="usage-reset" data-engine="baidu_llm">重置本地统计</button>
    </div>
  </div>

  <!-- 腾讯翻译配置 -->
  <div id="tencent-config" class="api-config">
    <div class="api-input">
      <label class="label" for="tencentSecretId">SecretId</label>
      <input type="text" id="tencentSecretId" placeholder="输入腾讯云 SecretId">
    </div>
    <div class="api-input">
      <label class="label" for="tencentSecretKey">SecretKey</label>
      <input type="password" id="tencentSecretKey" placeholder="输入腾讯云 SecretKey">
    </div>
    <div class="api-input">
      <label class="label" for="tencentRegion">地域</label>
      <select id="tencentRegion">
        <option value="ap-beijing">北京</option>
        <option value="ap-shanghai">上海</option>
        <option value="ap-guangzhou">广州</option>
        <option value="ap-chengdu">成都</option>
        <option value="ap-hongkong">中国香港</option>
        <option value="ap-singapore">新加坡</option>
      </select>
    </div>
    <div class="hint">在腾讯云控制台申请 API 密钥</div>
    <div class="usage-box" id="tencent-usage-box">
      <div class="usage-row">
        <span class="usage-label">本月已用</span>
        <span><span class="usage-value" id="tencent-usage-used">0</span> / 5,000,000 字符</span>
      </div>
      <div class="progress"><div class="progress-bar" id="tencent-usage-bar" style="width: 0%"></div></div>
      <div class="usage-row" style="margin-top: 6px;">
        <span class="usage-label">剩余 <span class="usage-value" id="tencent-usage-left">5,000,000</span></span>
        <a class="usage-link" href="https://console.cloud.tencent.com/tmt" target="_blank">官方查询</a>
      </div>
      <button class="usage-reset" data-engine="tencent">重置本地统计</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="setting-item">
    <label class="label" for="targetLang">目标语言</label>
    <select id="targetLang">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁体中文</option>
      <option value="en">英语</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
      <option value="fr">法语</option>
      <option value="de">德语</option>
      <option value="es">西班牙语</option>
      <option value="ru">俄语</option>
      <option value="it">意大利语</option>
      <option value="pt">葡萄牙语</option>
      <option value="ar">阿拉伯语</option>
    </select>
    <div class="hint">设置后立即生效</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
